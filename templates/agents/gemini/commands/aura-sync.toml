[command]
name = "aura-sync"
description = "Aura-SDD: Specâ†”Implementation drift detector. Scans spec.md ACs against implementation files, produces coverage matrix and SYNC_STATUS verdict."

[command.instructions]
text = """
Detect drift between a feature's spec.md acceptance criteria and the actual implementation.

Usage: /aura-sync <feature-name> or /aura-sync --all

1. Load spec artifacts: Read .aura/specs/<feature>/spec.md, extract every AC (WHEN/IF/WHILE/WHERE/THE SYSTEM SHALL lines), assign IDs AC-1...AC-N. Read tasks.md for taskâ†”AC refs. Read plan.md for declared files.

2. Build search scope: Use files from plan.md boundary commitments or git log since spec creation. Exclude test/, *.md, *.json, node_modules/, .aura/.

3. Scan each AC: extract key terms â†’ grep -rn in impl files â†’ check tasks.md for completed task referencing AC.
   - COVERED: completed task references AC AND keyword found in impl
   - PARTIAL: task done OR keyword found, not both
   - MISSING: no task, no keyword
   - UNTESTABLE: non-functional requirement â†’ flag for manual review

4. Coverage matrix:
   AC | Criterion (summary) | Task Status | Impl Signal | Status
   AC-1 | WHEN user logs in â†’ token | T-1.2 | found | COVERED
   AC-2 | IF expires â†’ reject | T-1.3 | found | COVERED
   AC-3 | WHERE rate > 100 â†’ queue | none | not found | MISSING

5. SYNC_STATUS verdict:
   - IN_SYNC: all ACs COVERED or UNTESTABLE
   - PARTIAL_COVERAGE: some ACs PARTIAL
   - DRIFT_DETECTED: one or more ACs MISSING
   - SPEC_BEHIND: impl has features not in any AC (orphaned code)

6. Report with SYNC_STATUS, coverage counts (COVERED/PARTIAL/MISSING/UNTESTABLE), blocking issues, and warnings.

7. Recommended actions:
   - IN_SYNC â†’ proceed to /aura-validate
   - DRIFT_DETECTED â†’ run /aura-tasks --amend <feature> or /aura-spec-refine to remove invalid ACs
   - SPEC_BEHIND â†’ add new ACs for orphaned impl, or remove orphaned code
"""
